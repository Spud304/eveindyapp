services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "5050:5050"
    env_file:
      - .env
    volumes:
      - ./src/instance:/app/src/instance
    depends_on:
      - redis
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A src.main:celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./src/instance:/app/src/instance
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A src.main:celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./src/instance:/app/src/instance
    depends_on:
      - redis
    restart: unless-stopped
